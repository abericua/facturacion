[build]
builder = "dockerfile"

[deploy]
# Railway expone un único puerto público ($PORT).
# El Dockerfile ya contiene el CMD correcto con streamlit run app.py --server.port $PORT
# Variables de entorno requeridas en Railway (Settings → Variables):
#
#   DATA_DIR            = /app/data          (volumen persistente)
#   SYSTEM_PEPPER       = <valor-secreto>
#   JWT_SECRET          = <valor-secreto>
#   ENV_MODE            = PRODUCTION
#   GOOGLE_API_KEY      = <tu-clave-gemini>  (si usas IA en producción)
#   ALLOWED_ORIGINS     = https://facturacion.solpropy.com/
