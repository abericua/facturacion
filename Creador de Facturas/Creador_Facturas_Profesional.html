<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Facturas - Sol Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }

        .form-panel {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
            position: sticky;
            top: 20px;
            max-height: 95vh;
            overflow-y: auto;
        }

        .invoice-preview {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .items-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .item-row {
            display: grid;
            grid-template-columns: 50px 1fr 100px 80px 30px;
            gap: 10px;
            margin-bottom: 10px;
            align-items: end;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-add {
            background: #4299e1;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-remove {
            background: #f56565;
            color: white;
            padding: 8px;
            font-size: 12px;
            width: 30px;
            height: 30px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        /* Estilos de la Factura */
        .invoice {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background: white;
            position: relative;
            font-family: Arial, sans-serif;
        }

        .invoice-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 3px solid black;
            margin-bottom: 0;
        }

        .header-left {
            border-right: 3px solid black;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .company-info {
            flex: 1;
        }

        .company-name {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .company-details {
            font-size: 11px;
            line-height: 1.5;
        }

        .header-right {
            padding: 15px;
            position: relative;
        }

        .invoice-title {
            text-align: center;
            margin-bottom: 10px;
        }

        .ruc-info {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .factura-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .dates {
            font-size: 10px;
            margin-bottom: 10px;
        }

        .invoice-number {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .client-section {
            border: 3px solid black;
            border-top: none;
            padding: 10px 15px;
        }

        .client-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 2px solid black;
            padding: 8px 0;
        }

        .client-row:last-child {
            border-bottom: none;
        }

        .client-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .client-value {
            font-size: 11px;
            padding-left: 20px;
        }

        .sales-condition {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .items-table {
            border: 3px solid black;
            border-top: none;
            width: 100%;
            border-collapse: collapse;
        }

        .items-table th {
            background: white;
            border-bottom: 2px solid black;
            padding: 8px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        .items-table td {
            border-bottom: 1px solid black;
            padding: 8px;
            font-size: 11px;
        }

        .items-table .qty-col {
            width: 60px;
            text-align: center;
        }

        .items-table .desc-col {
            text-align: left;
        }

        .items-table .price-col {
            width: 120px;
            text-align: right;
        }

        .items-table .value-col {
            width: 100px;
            text-align: center;
        }

        .subtotal-row {
            background: white;
            border: none;
        }

        .subtotal-row td {
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 2px solid black;
        }

        .total-row td {
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 2px solid black;
            padding: 12px 8px;
        }

        .total-words {
            border-bottom: 2px solid black;
            padding: 10px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .footer-section {
            border: 3px solid black;
            border-top: none;
            padding: 10px;
            font-size: 9px;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .footer-left {
            display: flex;
            gap: 20px;
        }

        .footer-right {
            text-align: right;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                grid-template-columns: 1fr;
            }
            .form-panel {
                display: none;
            }
            .invoice-preview {
                box-shadow: none;
                padding: 0;
            }
        }

        .checkbox-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .checkbox-group input[type="checkbox"],
        .checkbox-group input[type="radio"] {
            width: auto;
        }

        .tax-summary {
            font-weight: bold;
            font-size: 11px;
        }

        .currency-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
        }

        .currency-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .currency-option:hover {
            border-color: #667eea;
        }

        .currency-option.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .exchange-rate {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 5px;
            font-size: 12px;
        }

        .client-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .client-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .client-item {
            padding: 10px;
            margin-bottom: 5px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .client-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .client-item-info {
            flex: 1;
        }

        .client-item-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .client-item-ruc {
            font-size: 12px;
            color: #666;
        }

        .client-item-delete {
            color: #f56565;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .client-item-delete:hover {
            color: #e53e3e;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 13px;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }
    
        .autocomplete-container {
            position: relative;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 5px 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }

        .autocomplete-suggestions.active {
            display: block;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }

        .autocomplete-item:hover {
            background: #f0f4ff;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .product-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .product-details {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .product-manager {
            margin-top: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .saved-products-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .saved-product-item {
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .saved-product-item:hover {
            border-color: #667eea;
        }

        .product-delete-btn {
            color: #f56565;
            cursor: pointer;
            font-weight: bold;
            padding: 2px 8px;
        }

        .product-delete-btn:hover {
            color: #e53e3e;
        }

    
        .history-section {
            margin-top: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .history-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: white;
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #e0e0e0;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }

        .invoice-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .invoice-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .invoice-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .invoice-number {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .invoice-amount {
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .invoice-details {
            font-size: 12px;
            color: #666;
        }

        .invoice-actions {
            margin-top: 8px;
            display: flex;
            gap: 5px;
        }

        .btn-mini {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 3px;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 13px;
        }

        .filter-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .export-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Panel de Formulario -->
        <div class="form-panel">
            <h1>📋 Crear Factura</h1>
            
            <!-- Selector de Clientes Guardados -->
            <div class="client-selector">
                <h2>👥 Clientes Guardados</h2>
                <div id="clientList" class="client-list">
                    <!-- Los clientes se cargarán aquí -->
                </div>
            </div>


            <!-- Gestor de Productos -->
            <div class="product-manager">
                <h2>📦 Productos Guardados (<span id="productCount">0</span>)</h2>
                <button class="btn btn-add" onclick="toggleProductsList()">Ver Lista</button>
                <div id="savedProductsList" class="saved-products-list" style="display: none;">
                    <!-- Los productos se cargarán aquí -->
                </div>
            </div>


            <!-- Historial de Facturas -->
            <div class="history-section">
                <h2>📊 Historial de Facturas</h2>
                
                <div class="history-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalInvoices">0</div>
                        <div class="stat-label">Total Facturas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="monthInvoices">0</div>
                        <div class="stat-label">Este Mes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalAmount">₲ 0</div>
                        <div class="stat-label">Total Facturado</div>
                    </div>
                </div>

                <input type="text" class="search-box" id="searchInvoice" placeholder="🔍 Buscar por número, cliente o RUC...">
                
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterInvoices('all')">Todas</button>
                    <button class="filter-btn" onclick="filterInvoices('today')">Hoy</button>
                    <button class="filter-btn" onclick="filterInvoices('week')">Esta Semana</button>
                    <button class="filter-btn" onclick="filterInvoices('month')">Este Mes</button>
                </div>

                <div class="invoice-list" id="invoiceList">
                    <!-- Las facturas se cargarán aquí -->
                </div>

                <div class="export-section">
                    <h2 style="font-size: 14px; margin-bottom: 10px;">💾 Exportar Datos</h2>
                    <div class="button-group">
                        <button class="btn btn-secondary" onclick="exportAllData()">Exportar Todo</button>
                        <button class="btn btn-secondary" onclick="importData()">Importar Datos</button>
                    </div>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </div>

            <!-- Modal para ver detalles de factura -->
            <div class="modal" id="invoiceModal">
                <div class="modal-content">
                    <span class="modal-close" onclick="closeInvoiceModal()">&times;</span>
                    <div class="modal-header">Detalles de Factura</div>
                    <div id="invoiceModalContent"></div>
                    <div style="margin-top: 20px;">
                        <button class="btn btn-primary" onclick="reloadInvoice()">Cargar Factura</button>
                        <button class="btn btn-danger" onclick="deleteInvoiceFromHistory()">Eliminar</button>
                    </div>
                </div>
            </div>

            <div class="currency-selector">
                <div class="currency-option active" onclick="setCurrency('PYG')">
                    💵 Guaraníes
                </div>
                <div class="currency-option" onclick="setCurrency('USD')">
                    💲 Dólares
                </div>
            </div>

            <div id="exchangeRateDiv" style="display: none;" class="exchange-rate">
                <label>Tipo de Cambio (1 USD = X PYG)</label>
                <input type="number" id="exchangeRate" value="7300" step="10">
            </div>

            <div class="form-group">
                <label>Número de Factura</label>
                <input type="text" id="invoiceNumber" value="002-001-0454" placeholder="Ej: 002-001-0454">
            </div>

            <div class="form-group">
                <label>Fecha de Emisión</label>
                <input type="date" id="issueDate" value="2026-04-09">
            </div>

            <div class="form-group">
                <label>Condición de Venta</label>
                <div class="checkbox-group">
                    <label><input type="radio" name="saleCondition" value="CONTADO" checked> Contado</label>
                    <label><input type="radio" name="saleCondition" value="CRÉDITO"> Crédito</label>
                </div>
            </div>

            <div class="form-group">
                <label>Nombre o Razón Social</label>
                <input type="text" id="clientName" value="GRUPO UTEX EAS" placeholder="Nombre del cliente">
            </div>

            <div class="form-group">
                <label>RUC o C.I. N°</label>
                <input type="text" id="clientRuc" value="80141066-5" placeholder="RUC del cliente">
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="clientAddress" value="CIUDAD DEL ESTE" placeholder="Dirección del cliente">
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" id="clientPhone" value="0" placeholder="Teléfono">
            </div>

            <div class="form-group">
                <label>Nota de Remisión N°</label>
                <input type="text" id="remissionNote" placeholder="Opcional">
            </div>

            <button class="btn btn-secondary" onclick="saveClient()">💾 Guardar Cliente</button>

            <div class="items-section">
                <h2>Productos/Servicios</h2>
                <div id="itemsContainer">
                    <div class="item-row">
                        <div>
                            <label>Cant.</label>
                            <input type="number" class="item-qty" value="2" min="1">
                        </div>
                        <div>
                            <label>Descripción</label>
                            <input type="text" class="item-desc" value="TINTAS YELLW T43M420">
                        </div>
                        <div>
                            <label>Precio Unit.</label>
                            <input type="number" class="item-price" value="2960000" step="1000">
                        </div>
                        <div>
                            <label>IVA %</label>
                            <select class="item-iva">
                                <option value="0">Exentas</option>
                                <option value="5">5%</option>
                                <option value="10" selected>10%</option>
                            </select>
                        </div>
                        <div>
                            <label>&nbsp;</label>
                            <button class="btn btn-remove" onclick="removeItem(this)">×</button>
                        </div>
                    </div>
                </div>
                <button class="btn btn-add" onclick="addItem()">+ Agregar Ítem</button>
            </div>

            <button class="btn btn-primary" onclick="updateInvoice()">🔄 Actualizar Vista Previa</button>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="generatePDF()">📄 Generar PDF</button>
                <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>

        <!-- Vista Previa de la Factura -->
        <div class="invoice-preview">
            <div class="invoice" id="invoice">
                <!-- El contenido se generará con JavaScript -->
            </div>
        </div>
    </div>

    <script>
        let currentCurrency = 'PYG';
        let savedClients = [];


        let savedProducts = [];
        let currentAutocompleteInput = null;

        // Cargar productos guardados
        function loadProducts() {
            const stored = localStorage.getItem('solproProducts');
            if (stored) {
                savedProducts = JSON.parse(stored);
                updateProductCount();
            }
        }

        // Guardar producto (solo descripción)
        function saveProduct(description) {
            // Verificar si ya existe
            const exists = savedProducts.find(p => 
                p.description.toLowerCase() === description.toLowerCase()
            );

            if (!exists && description.trim()) {
                savedProducts.push({
                    description: description.trim(),
                    uses: 1,
                    lastUsed: new Date().getTime()
                });
            } else if (exists) {
                // Actualizar contador de usos
                exists.uses++;
                exists.lastUsed = new Date().getTime();
            }

            localStorage.setItem('solproProducts', JSON.stringify(savedProducts));
            updateProductCount();
        }

        // Guardar productos de la factura actual (solo descripción)
        function saveCurrentProducts() {
            const itemRows = document.querySelectorAll('.item-row');
            itemRows.forEach(row => {
                const desc = row.querySelector('.item-desc').value;
                
                if (desc && desc.trim()) {
                    saveProduct(desc);
                }
            });
        }

        // Actualizar contador
        function updateProductCount() {
            document.getElementById('productCount').textContent = savedProducts.length;
        }

        // Toggle lista de productos
        function toggleProductsList() {
            const list = document.getElementById('savedProductsList');
            if (list.style.display === 'none') {
                displaySavedProducts();
                list.style.display = 'block';
            } else {
                list.style.display = 'none';
            }
        }

        // Mostrar productos guardados
        function displaySavedProducts() {
            const container = document.getElementById('savedProductsList');
            
            if (savedProducts.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px; font-size: 12px;">No hay productos guardados aún</p>';
                return;
            }

            // Ordenar por más usados
            savedProducts.sort((a, b) => b.uses - a.uses);

            container.innerHTML = savedProducts.map((product, index) => `
                <div class="saved-product-item">
                    <div>
                        <div style="font-weight: 600;">${product.description}</div>
                        <div style="color: #666; font-size: 11px;">
                            Usado ${product.uses} veces
                        </div>
                    </div>
                    <span class="product-delete-btn" onclick="deleteProduct(event, ${index})">×</span>
                </div>
            `).join('');
        }

        // Eliminar producto
        function deleteProduct(event, index) {
            event.stopPropagation();
            
            if (confirm('¿Eliminar este producto?')) {
                savedProducts.splice(index, 1);
                localStorage.setItem('solproProducts', JSON.stringify(savedProducts));
                displaySavedProducts();
                updateProductCount();
            }
        }

        // Configurar autocompletado para un input
        function setupAutocomplete(input) {
            const container = document.createElement('div');
            container.className = 'autocomplete-suggestions';
            input.parentElement.style.position = 'relative';
            input.parentElement.appendChild(container);

            input.addEventListener('input', function() {
                const value = this.value.toLowerCase().trim();
                
                if (value.length < 2) {
                    container.classList.remove('active');
                    return;
                }

                // Filtrar productos
                const matches = savedProducts.filter(p => 
                    p.description.toLowerCase().includes(value)
                ).sort((a, b) => b.uses - a.uses).slice(0, 5);

                if (matches.length === 0) {
                    container.classList.remove('active');
                    return;
                }

                // Mostrar sugerencias
                container.innerHTML = matches.map(product => `
                    <div class="autocomplete-item" data-description="${product.description}">
                        <div class="product-name">${product.description}</div>
                        <div class="product-details">
                            Usado ${product.uses} veces
                        </div>
                    </div>
                `).join('');

                container.classList.add('active');

                // Agregar eventos a las sugerencias
                container.querySelectorAll('.autocomplete-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const row = input.closest('.item-row');
                        row.querySelector('.item-desc').value = this.dataset.description;
                        container.classList.remove('active');
                        // Enfocar el campo de precio para que el usuario lo complete
                        row.querySelector('.item-price').focus();
                    });
                });
            });

            // Cerrar al hacer clic fuera
            document.addEventListener('click', function(e) {
                if (!input.parentElement.contains(e.target)) {
                    container.classList.remove('active');
                }
            });
        }

        // Modificar addItem para incluir autocompletado
        const originalAddItem = addItem;
        addItem = function() {
            originalAddItem();
            const newRow = document.getElementById('itemsContainer').lastElementChild;
            const input = newRow.querySelector('.item-desc');
            setupAutocomplete(input);
        };

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            loadClients();
            loadProducts();
            loadInvoiceHistory();
            updateInvoice();
            
            // Configurar autocompletado para items existentes
            document.querySelectorAll('.item-desc').forEach(input => {
                setupAutocomplete(input);
            });
        });

        // Modificar generatePDF para guardar productos antes de generar
        const originalGeneratePDF = generatePDF;
        generatePDF = function() {
            saveCurrentProducts();
            showAlert('Productos guardados automáticamente', 'info');
            setTimeout(() => {
                originalGeneratePDF();
            }, 500);
        };


        // Cargar clientes desde localStorage
        function loadClients() {
            const stored = localStorage.getItem('solproClients');
            if (stored) {
                savedClients = JSON.parse(stored);
                displayClients();
            }
        }

        // Guardar cliente
        function saveClient() {
            const name = document.getElementById('clientName').value.trim();
            const ruc = document.getElementById('clientRuc').value.trim();
            const address = document.getElementById('clientAddress').value.trim();
            const phone = document.getElementById('clientPhone').value.trim();

            if (!name || !ruc) {
                alert('Por favor ingrese al menos el nombre y RUC del cliente');
                return;
            }

            // Verificar si ya existe
            const existingIndex = savedClients.findIndex(c => c.ruc === ruc);
            
            const client = {
                name: name,
                ruc: ruc,
                address: address,
                phone: phone,
                timestamp: new Date().getTime()
            };

            if (existingIndex >= 0) {
                // Actualizar cliente existente
                savedClients[existingIndex] = client;
                showAlert('Cliente actualizado correctamente', 'success');
            } else {
                // Agregar nuevo cliente
                savedClients.push(client);
                showAlert('Cliente guardado correctamente', 'success');
            }

            // Guardar en localStorage
            localStorage.setItem('solproClients', JSON.stringify(savedClients));
            displayClients();
        }

        // Mostrar clientes en la lista
        function displayClients() {
            const container = document.getElementById('clientList');
            
            if (savedClients.length === 0) {
                container.innerHTML = '<p style="color: #666; font-size: 12px; text-align: center; padding: 20px;">No hay clientes guardados</p>';
                return;
            }

            // Ordenar por más recientes
            savedClients.sort((a, b) => b.timestamp - a.timestamp);

            container.innerHTML = savedClients.map((client, index) => `
                <div class="client-item" onclick="loadClient(${index})">
                    <div class="client-item-info">
                        <div class="client-item-name">${client.name}</div>
                        <div class="client-item-ruc">RUC: ${client.ruc}</div>
                    </div>
                    <div class="client-item-delete" onclick="deleteClient(event, ${index})">×</div>
                </div>
            `).join('');
        }

        // Cargar datos del cliente
        function loadClient(index) {
            const client = savedClients[index];
            document.getElementById('clientName').value = client.name;
            document.getElementById('clientRuc').value = client.ruc;
            document.getElementById('clientAddress').value = client.address || '';
            document.getElementById('clientPhone').value = client.phone || '';
            
            showAlert('Cliente cargado: ' + client.name, 'info');
            updateInvoice();
        }

        // Eliminar cliente
        function deleteClient(event, index) {
            event.stopPropagation();
            
            if (confirm('¿Está seguro de eliminar este cliente?')) {
                savedClients.splice(index, 1);
                localStorage.setItem('solproClients', JSON.stringify(savedClients));
                displayClients();
                showAlert('Cliente eliminado', 'success');
            }
        }

        // Mostrar alertas
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            const formPanel = document.querySelector('.form-panel');
            formPanel.insertBefore(alertDiv, formPanel.firstChild);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }

        function setCurrency(currency) {
            currentCurrency = currency;
            
            // Actualizar UI
            document.querySelectorAll('.currency-option').forEach(opt => {
                opt.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Mostrar/ocultar tipo de cambio
            document.getElementById('exchangeRateDiv').style.display = currency === 'USD' ? 'block' : 'none';
            
            updateInvoice();
        }

        // Función para formatear números con separador de miles
        function formatNumber(num, currency = 'PYG') {
            if (currency === 'USD') {
                return num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            }
            return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Función para convertir PYG a USD
        function convertToUSD(amountPYG) {
            const rate = parseFloat(document.getElementById('exchangeRate').value) || 7300;
            return amountPYG / rate;
        }

        // Función para obtener símbolo de moneda
        function getCurrencySymbol() {
            return currentCurrency === 'USD' ? 'US$' : '₲';
        }

        // Función para convertir número a palabras
        function numeroALetras(num) {
            const unidades = ['', 'UN', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
            const decenas = ['', '', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];
            const centenas = ['', 'CIENTO', 'DOSCIENTOS', 'TRESCIENTOS', 'CUATROCIENTOS', 'QUINIENTOS', 'SEISCIENTOS', 'SETECIENTOS', 'OCHOCIENTOS', 'NOVECIENTOS'];
            const especiales = ['DIEZ', 'ONCE', 'DOCE', 'TRECE', 'CATORCE', 'QUINCE', 'DIECISÉIS', 'DIECISIETE', 'DIECIOCHO', 'DIECINUEVE'];

            num = Math.round(num);

            if (num === 0) return 'CERO';
            if (num === 100) return 'CIEN';

            let resultado = '';

            // Millones
            if (num >= 1000000) {
                const millones = Math.floor(num / 1000000);
                if (millones === 1) {
                    resultado += 'UN MILLÓN ';
                } else {
                    resultado += numeroALetras(millones) + ' MILLONES ';
                }
                num %= 1000000;
            }

            // Miles
            if (num >= 1000) {
                const miles = Math.floor(num / 1000);
                if (miles === 1) {
                    resultado += 'MIL ';
                } else {
                    resultado += numeroALetras(miles) + ' MIL ';
                }
                num %= 1000;
            }

            // Centenas
            if (num >= 100) {
                resultado += centenas[Math.floor(num / 100)] + ' ';
                num %= 100;
            }

            // Decenas y unidades
            if (num >= 20) {
                resultado += decenas[Math.floor(num / 10)];
                if (num % 10 > 0) {
                    resultado += ' Y ' + unidades[num % 10];
                }
            } else if (num >= 10) {
                resultado += especiales[num - 10];
            } else if (num > 0) {
                resultado += unidades[num];
            }

            return resultado.trim();
        }

                            <strong>Total IVA:</strong><br>
                            ${totalIVA > 0 ? getCurrencySymbol() + ' ' + formatNumber(totalIVA, currentCurrency) : ''}
                        </div>
                    </div>
                    <div class="footer-right">
                        <strong>ImpreGraf S.R.L.</strong> - Habilitación N° 1708 - RUC: 80067785 - 0 / Tel. (021) 511 906 - Cel. (0982) 163 790<br>
                        Uscher Ríos c/ Magallanes - Fdo. de la Mora / 5 Tal. 50 x 3 del 0001 - 0750 - 21/04/2026<br>

                        Triplicado: Contabilidad (No Válido para Crédito Fiscal)</em>

            document.getElementById('invoice').innerHTML = invoiceHTML;
        }

        // Generar PDF
        function generatePDF() {
            const invoiceNumber = document.getElementById('invoiceNumber').value.replace(/\//g, '-');
            const element = document.getElementById('invoice');
            
            const opt = {
                margin: 0,
                filename: `Factura_${invoiceNumber}.pdf`,
                image: { type: 'jpeg', quality: 0.85 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    letterRendering: true
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: 'a4', 
                    orientation: 'portrait',
                    compress: true
                }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                showAlert('PDF generado: Factura_' + invoiceNumber + '.pdf', 'success');
            });
        }


        let invoiceHistory = [];
        let currentFilter = 'all';
        let selectedInvoice = null;

        // Cargar historial
        function loadInvoiceHistory() {
            const stored = localStorage.getItem('solproInvoices');
            if (stored) {
                invoiceHistory = JSON.parse(stored);
                updateHistoryStats();
                displayInvoices();
            }
        }

        // Guardar factura en historial
        function saveInvoiceToHistory() {
            const invoiceNumber = document.getElementById('invoiceNumber').value;
            const issueDate = document.getElementById('issueDate').value;
            const clientName = document.getElementById('clientName').value;
            const clientRuc = document.getElementById('clientRuc').value;
            const clientAddress = document.getElementById('clientAddress').value;
            const clientPhone = document.getElementById('clientPhone').value;
            const remissionNote = document.getElementById('remissionNote').value;
            const saleCondition = document.querySelector('input[name="saleCondition"]:checked').value;

            // Obtener ítems
            const items = [];
            const itemRows = document.querySelectorAll('.item-row');
            let total = 0;

            itemRows.forEach(row => {
                const qty = parseInt(row.querySelector('.item-qty').value) || 0;
                const desc = row.querySelector('.item-desc').value;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                const iva = parseInt(row.querySelector('.item-iva').value);
                const itemTotal = qty * price;
                
                if (desc && qty > 0) {
                    items.push({
                        quantity: qty,
                        description: desc,
                        price: price,
                        iva: iva,
                        total: itemTotal
                    });
                    total += itemTotal;
                }
            });

            // Crear objeto de factura
            const invoice = {
                id: Date.now(),
                number: invoiceNumber,
                date: issueDate,
                timestamp: new Date(issueDate).getTime(),
                client: {
                    name: clientName,
                    ruc: clientRuc,
                    address: clientAddress,
                    phone: clientPhone
                },
                remissionNote: remissionNote,
                saleCondition: saleCondition,
                items: items,
                total: total,
                currency: currentCurrency
            };

            // Verificar si ya existe (para evitar duplicados)
            const existingIndex = invoiceHistory.findIndex(inv => 
                inv.number === invoiceNumber && inv.date === issueDate
            );

            if (existingIndex >= 0) {
                // Actualizar existente
                invoiceHistory[existingIndex] = invoice;
            } else {
                // Agregar nuevo
                invoiceHistory.push(invoice);
            }

            // Guardar en localStorage
            localStorage.setItem('solproInvoices', JSON.stringify(invoiceHistory));
            
            updateHistoryStats();
            displayInvoices();
        }

        // Actualizar estadísticas
        function updateHistoryStats() {
            const total = invoiceHistory.length;
            document.getElementById('totalInvoices').textContent = total;

            // Facturas este mes
            const now = new Date();
            const thisMonth = invoiceHistory.filter(inv => {
                const invDate = new Date(inv.date);
                return invDate.getMonth() === now.getMonth() && 
                       invDate.getFullYear() === now.getFullYear();
            }).length;
            document.getElementById('monthInvoices').textContent = thisMonth;

            // Total facturado (solo en guaraníes para estadísticas)
            const totalAmount = invoiceHistory.reduce((sum, inv) => {
                if (inv.currency === 'PYG') {
                    return sum + inv.total;
                } else {
                    // Convertir USD a PYG para estadísticas
                    const rate = parseFloat(document.getElementById('exchangeRate').value) || 7300;
                    return sum + (inv.total * rate);
                }
            }, 0);
            document.getElementById('totalAmount').textContent = '₲ ' + formatNumber(totalAmount, 'PYG');
        }

        // Mostrar facturas
        function displayInvoices() {
            const container = document.getElementById('invoiceList');
            const searchTerm = document.getElementById('searchInvoice').value.toLowerCase();

            if (invoiceHistory.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 20px; font-size: 12px;">No hay facturas guardadas</p>';
                return;
            }

            // Filtrar facturas
            let filtered = invoiceHistory.filter(inv => {
                const matchSearch = !searchTerm || 
                    inv.number.toLowerCase().includes(searchTerm) ||
                    inv.client.name.toLowerCase().includes(searchTerm) ||
                    inv.client.ruc.toLowerCase().includes(searchTerm);

                const invDate = new Date(inv.date);
                const now = new Date();

                if (currentFilter === 'today') {
                    return matchSearch && invDate.toDateString() === now.toDateString();
                } else if (currentFilter === 'week') {
                    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    return matchSearch && invDate >= weekAgo;
                } else if (currentFilter === 'month') {
                    return matchSearch && invDate.getMonth() === now.getMonth() && 
                           invDate.getFullYear() === now.getFullYear();
                }
                return matchSearch;
            });

            // Ordenar por fecha (más recientes primero)
            filtered.sort((a, b) => b.timestamp - a.timestamp);

            container.innerHTML = filtered.map(inv => {
                const symbol = inv.currency === 'USD' ? 'US$' : '₲';
                const amount = formatNumber(inv.total, inv.currency);
                const date = new Date(inv.date).toLocaleDateString('es-PY');
                
                return `
                    <div class="invoice-item" onclick="viewInvoiceDetails(${inv.id})">
                        <div class="invoice-header">
                            <span class="invoice-number">📄 ${inv.number}</span>
                            <span class="invoice-amount">${symbol} ${amount}</span>
                        </div>
                        <div class="invoice-details">
                            <strong>${inv.client.name}</strong> - RUC: ${inv.client.ruc}<br>
                            ${date} | ${inv.items.length} item(s) | ${inv.saleCondition}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Ver detalles de factura
        function viewInvoiceDetails(id) {
            selectedInvoice = invoiceHistory.find(inv => inv.id === id);
            if (!selectedInvoice) return;

            const symbol = selectedInvoice.currency === 'USD' ? 'US$' : '₲';
            const amount = formatNumber(selectedInvoice.total, selectedInvoice.currency);

            let itemsHtml = selectedInvoice.items.map(item => `
                <tr>
                    <td>${item.quantity}</td>
                    <td>${item.description}</td>
                    <td style="text-align: right;">${symbol} ${formatNumber(item.price, selectedInvoice.currency)}</td>
                    <td style="text-align: center;">${item.iva}%</td>
                </tr>
            `).join('');

            const content = `
                <div style="margin-bottom: 15px;">
                    <strong>Número:</strong> ${selectedInvoice.number}<br>
                    <strong>Fecha:</strong> ${new Date(selectedInvoice.date).toLocaleDateString('es-PY')}<br>
                    <strong>Condición:</strong> ${selectedInvoice.saleCondition}
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Cliente:</strong> ${selectedInvoice.client.name}<br>
                    <strong>RUC:</strong> ${selectedInvoice.client.ruc}<br>
                    <strong>Dirección:</strong> ${selectedInvoice.client.address}<br>
                    <strong>Teléfono:</strong> ${selectedInvoice.client.phone}
                </div>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
                    <thead>
                        <tr style="background: #f7fafc;">
                            <th style="padding: 8px; border: 1px solid #e0e0e0;">Cant.</th>
                            <th style="padding: 8px; border: 1px solid #e0e0e0;">Descripción</th>
                            <th style="padding: 8px; border: 1px solid #e0e0e0;">Precio</th>
                            <th style="padding: 8px; border: 1px solid #e0e0e0;">IVA</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>
                <div style="text-align: right; font-size: 18px; font-weight: bold;">
                    Total: ${symbol} ${amount}
                </div>
            `;

            document.getElementById('invoiceModalContent').innerHTML = content;
            document.getElementById('invoiceModal').classList.add('active');
        }

        // Cerrar modal
        function closeInvoiceModal() {
            document.getElementById('invoiceModal').classList.remove('active');
            selectedInvoice = null;
        }

        // Recargar factura
        function reloadInvoice() {
            if (!selectedInvoice) return;

            // Cargar datos en el formulario
            document.getElementById('invoiceNumber').value = selectedInvoice.number;
            document.getElementById('issueDate').value = selectedInvoice.date;
            document.getElementById('clientName').value = selectedInvoice.client.name;
            document.getElementById('clientRuc').value = selectedInvoice.client.ruc;
            document.getElementById('clientAddress').value = selectedInvoice.client.address;
            document.getElementById('clientPhone').value = selectedInvoice.client.phone;
            document.getElementById('remissionNote').value = selectedInvoice.remissionNote || '';
            
            // Condición de venta
            const radioBtn = document.querySelector(`input[name="saleCondition"][value="${selectedInvoice.saleCondition}"]`);
            if (radioBtn) radioBtn.checked = true;

            // Cambiar moneda si es necesario
            if (selectedInvoice.currency !== currentCurrency) {
                setCurrency(selectedInvoice.currency);
            }

            // Limpiar items actuales
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            // Cargar items de la factura
            selectedInvoice.items.forEach((item, index) => {
                if (index > 0) addItem();
                
                const row = container.children[index];
                row.querySelector('.item-qty').value = item.quantity;
                row.querySelector('.item-desc').value = item.description;
                row.querySelector('.item-price').value = item.price;
                row.querySelector('.item-iva').value = item.iva;
            });

            updateInvoice();
            closeInvoiceModal();
            
            showAlert('Factura cargada: ' + selectedInvoice.number, 'success');
            
            // Scroll al inicio
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Eliminar factura del historial
        function deleteInvoiceFromHistory() {
            if (!selectedInvoice) return;
            
            if (confirm('¿Eliminar la factura ' + selectedInvoice.number + ' del historial?')) {
                invoiceHistory = invoiceHistory.filter(inv => inv.id !== selectedInvoice.id);
                localStorage.setItem('solproInvoices', JSON.stringify(invoiceHistory));
                
                updateHistoryStats();
                displayInvoices();
                closeInvoiceModal();
                
                showAlert('Factura eliminada del historial', 'success');
            }
        }

        // Filtrar facturas
        function filterInvoices(filter) {
            currentFilter = filter;
            
            // Actualizar botones activos
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayInvoices();
        }

        // Búsqueda en tiempo real
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInvoice');
            if (searchInput) {
                searchInput.addEventListener('input', displayInvoices);
            }
        });

        // Exportar todos los datos
        function exportAllData() {
            const data = {
                clientes: savedClients,
                productos: savedProducts,
                facturas: invoiceHistory,
                exportDate: new Date().toISOString(),
                version: '1.0'
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SolPro_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);

            showAlert('Datos exportados correctamente', 'success');
        }

        // Importar datos
        function importData() {
            document.getElementById('importFile').click();
        }

        document.getElementById('importFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    
                    if (confirm('¿Importar datos? Esto REEMPLAZARÁ todos los datos actuales.')) {
                        if (data.clientes) {
                            savedClients = data.clientes;
                            localStorage.setItem('solproClients', JSON.stringify(savedClients));
                            displayClients();
                        }
                        
                        if (data.productos) {
                            savedProducts = data.productos;
                            localStorage.setItem('solproProducts', JSON.stringify(savedProducts));
                            displaySavedProducts();
                            updateProductCount();
                        }
                        
                        if (data.facturas) {
                            invoiceHistory = data.facturas;
                            localStorage.setItem('solproInvoices', JSON.stringify(invoiceHistory));
                            updateHistoryStats();
                            displayInvoices();
                        }
                        
                        showAlert('Datos importados correctamente', 'success');
                    }
                } catch (error) {
                    alert('Error al importar: Archivo inválido');
                }
            };
            reader.readAsText(file);
            
            // Resetear input
            e.target.value = '';
        });

        // Modificar generatePDF para guardar en historial
        const originalGeneratePDFFunc = generatePDF;
        generatePDF = function() {
            saveCurrentProducts();
            saveInvoiceToHistory();
            showAlert('Factura guardada en historial', 'success');
            setTimeout(() => {
                originalGeneratePDFFunc();
            }, 500);
        };

        // Cargar historial al iniciar (agregar a la inicialización existente)
        const originalInitCode = `loadClients();
            loadProducts();
            updateInvoice();`;

        const newInitCode = `loadClients();
            loadProducts();
            loadInvoiceHistory();
            updateInvoice();`;

    </script>
