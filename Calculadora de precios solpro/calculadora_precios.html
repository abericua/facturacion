<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLPRO ELITE | Professional Pricing Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0e1117;
            --card-bg: rgba(26, 29, 35, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --solpro-yellow: #f1c40f;
            --solpro-yellow-hover: #d4ac0d;
            --success: #2ecc71;
            --danger: #e74c3c;
            --glass-blur: blur(16px);
            --font-family: 'Inter', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            font-family: var(--font-family); 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            perspective: 2000px;
        }

        body::before {
            content: "";
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(241, 196, 15, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(46, 204, 113, 0.05) 0%, transparent 40%),
                radial-gradient(circle at center, #1a1d23 0%, #0e1117 100%);
            z-index: -1;
        }

        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
            padding: 25px 35px; background: var(--card-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: sticky; top: 20px; z-index: 100;
        }

        .logo-area h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.05em; margin: 0; }
        .logo-area h1 span { color: var(--solpro-yellow); }
        .logo-area p { color: var(--text-muted); font-size: 0.65rem; margin: 0; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; }

        .top-actions { display: flex; gap: 12px; }
        .btn-elite {
            background: var(--solpro-yellow); color: #000; border: none; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 8px; text-transform: uppercase;
        }
        .btn-elite:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 20px rgba(241, 196, 15, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--card-border); }

        .main-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; min-width: 0; }
        .admin-sidebar { display: flex; flex-direction: column; gap: 25px; }

        .bento-card {
            background: var(--card-bg); backdrop-filter: var(--glass-blur); padding: 25px; border-radius: 24px;
            border: 1px solid var(--card-border); box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: 0.4s;
        }
        .bento-card:hover { border-color: rgba(241, 196, 15, 0.3); }
        .bento-card h2 { 
            font-size: 0.8rem; font-weight: 800; color: var(--solpro-yellow); 
            text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
            border-radius: 10px; color: white; font-weight: 600; font-size: 0.9rem; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--solpro-yellow); outline: none; background: rgba(255,255,255,0.1); }

        .content-area { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
        .filter-shelf { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .search-main { flex: 1; min-width: 180px; position: relative; }
        .search-main input {
            width: 100%; padding: 14px 20px 14px 48px; background: var(--card-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border); border-radius: 14px; color: white; font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .search-main i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--solpro-yellow); }

        .select-filter {
            padding: 14px 14px; background: var(--card-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border); border-radius: 14px; color: white; font-weight: 700; font-size: 0.75rem;
            cursor: pointer; min-width: 140px; max-width: 160px;
        }

        .table-shelf {
            background: var(--card-bg); backdrop-filter: var(--glass-blur); border-radius: 24px;
            border: 1px solid var(--card-border); overflow-x: auto; box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }
        .table-shelf table { min-width: 700px; }

        table { width: 100%; border-collapse: collapse; }
        th { 
            background: rgba(255,255,255,0.02); padding: 14px 16px; text-align: left;
            font-size: 0.6rem; color: var(--solpro-yellow); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800;
            white-space: nowrap;
        }
        td { padding: 14px 16px; border-bottom: 1px solid var(--card-border); vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.03); }

        .price-col { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 800; }
        .gs-color { color: var(--success); }
        .usd-color { color: #3498db; }
        .profit-badge { 
            font-size: 0.6rem; padding: 4px 8px; border-radius: 6px; background: rgba(46, 204, 113, 0.1); color: var(--success);
            font-weight: 800; border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .actions-cell { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-action {
            width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--text-muted);
            transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-3px); color: #000; background: var(--solpro-yellow); }
        .btn-danger-action:hover { background: var(--danger); color: white; }

        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items: center; justify-content: center;
        }
        .modal-content { 
            background: #161b22; padding: 40px; border-radius: 24px; width: 500px; border: 1px solid var(--card-border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .badge-combo { background: rgba(241, 196, 15, 0.1); color: var(--solpro-yellow); }
        
        .status-footer { margin-top: 30px; text-align: center; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div id="roiModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--solpro-yellow); margin-bottom:10px;">Calculadora de ROI</h2>
            <p id="roi_product_name" style="color:var(--text-muted); margin-bottom:25px;"></p>
            <div class="form-group">
                <label>Inversión Total (Gs)</label>
                <input type="text" id="roi_total_inv" readonly>
            </div>
            <div class="form-group">
                <label>Tu ganancia neta por unidad (Gs)</label>
                <input type="number" id="roi_profit_unit" value="50000" oninput="calculateROI()">
            </div>
            <div class="form-group">
                <label>Producción diaria estimada</label>
                <input type="number" id="roi_daily_prod" value="10" oninput="calculateROI()">
            </div>
            <div style="background:rgba(46, 204, 113, 0.1); padding:20px; border-radius:15px; text-align:center; margin-top:20px;">
                <span style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:800;">Retorno estimado en</span>
                <div style="font-size:3rem; font-weight:900; color:var(--success);" id="roi_result_days">0</div>
                <span style="font-size:0.8rem; color:var(--success); font-weight:800;">DÍAS DE TRABAJO</span>
            </div>
            <button class="btn-elite" style="width:100%; justify-content:center; margin-top:20px;" onclick="document.getElementById('roiModal').style.display='none'">CERRAR</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--solpro-yellow); margin-bottom:30px;">Editar Producto</h2>
            <input type="hidden" id="edit_original_id">
            <div class="form-group"><label>ID</label><input type="text" id="edit_id" readonly></div>
            <div class="form-group"><label>Nombre</label><input type="text" id="edit_nombre"></div>
            <div class="form-group"><label>Costo Base</label><input type="number" id="edit_costo"></div>
            <div class="form-group"><label>Margen Individual (%)</label><input type="number" id="edit_margen"></div>
            <button class="btn-elite" style="width:100%; justify-content:center; padding:15px;" onclick="saveEdit()">GUARDAR CAMBIOS</button>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>SOLPRO <span>ELITE</span></h1>
                <p>Advanced Pricing Ecosystem v35.2</p>
            </div>
            <div class="top-actions">
                <button class="btn-elite" id="btn_save_config"><i data-lucide="save"></i> Guardar Todo</button>
                <button class="btn-elite btn-secondary" id="btn_export"><i data-lucide="download"></i> Exportar CSV</button>
                <button class="btn-elite btn-secondary" id="btn_clear" style="color:var(--danger); border-color:var(--danger);"><i data-lucide="refresh-ccw"></i> Reset</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="admin-sidebar">
                <div class="bento-card">
                    <h2><i data-lucide="settings"></i> Parámetros</h2>
                    <div class="params-grid">
                        <div class="form-group">
                            <label>Dólar Mercado</label>
                            <input type="number" id="p_dolar" value="6250" oninput="calculateAll()">
                        </div>
                        <div class="form-group">
                            <label>Buffer Piso</label>
                            <input type="number" id="p_buffer" value="0" oninput="calculateAll()">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Banda Piso (Compra)</label>
                        <input type="text" id="p_banda" readonly style="color:var(--success); border-color:rgba(46, 204, 113, 0.3);">
                    </div>
                    <div class="form-group">
                        <label>Margen Global (%)</label>
                        <input type="number" id="p_margen" value="23" oninput="applyGlobalMargin(this.value)">
                    </div>
                </div>

                <div class="bento-card">
                    <h2><i data-lucide="plus-circle"></i> Nuevo Producto</h2>
                    <div class="form-group">
                        <label>Proveedor</label>
                        <select id="new_prov" onchange="suggestID()">
                            <option value="Sol Control">Sol Control (SC)</option>
                            <option value="Importacion SOLPRO">Importacion SOLPRO (IM)</option>
                            <option value="Todo Costura">Todo Costura (TC)</option>
                            <option value="COMBO">📦 COMBO (CMB)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Línea</label>
                        <select id="new_linea">
                            <option value="COMERCIAL">COMERCIAL</option>
                            <option value="INDUSTRIAL">INDUSTRIAL</option>
                            <option value="ACCESORIOS">ACCESORIOS</option>
                            <option value="INSUMOS">INSUMOS</option>
                        </select>
                    </div>
                    <div class="form-group"><label>ID Ref</label><input type="text" id="new_id"></div>
                    <div class="form-group"><label>Nombre</label><input type="text" id="new_nombre"></div>
                    <div class="form-group"><label>Costo</label><input type="number" id="new_costo" value="0"></div>
                    <div class="form-group">
                        <label>Moneda</label>
                        <select id="new_moneda"><option value="USD">USD</option><option value="GS">GS</option></select>
                    </div>
                    <button class="btn-elite" style="width:100%; justify-content:center;" onclick="saveNewProduct()"><i data-lucide="plus"></i> Agregar</button>
                </div>
            </aside>

            <main class="content-area">
                <div class="filter-shelf">
                    <div class="search-main">
                        <i data-lucide="search"></i>
                        <input type="text" id="main_search" placeholder="Busca por nombre, ID o categoría..." oninput="renderTable()">
                    </div>
                    <select id="filter_linea" class="select-filter" onchange="renderTable()">
                        <option value="">Línea: Todas</option>
                        <option value="COMERCIAL">Comercial</option>
                        <option value="INDUSTRIAL">Industrial</option>
                        <option value="ACCESORIOS">Accesorios</option>
                        <option value="INSUMOS">Insumos</option>
                        <option value="COMBO COMERCIAL">Combos Comerciales</option>
                        <option value="COMBO INDUSTRIAL">Combos Industriales</option>
                    </select>
                    <select id="filter_prov" class="select-filter" onchange="renderTable()">
                        <option value="">Prov: Todos</option>
                        <option value="Sol Control">Sol Control</option>
                        <option value="Importacion SOLPRO">Importación</option>
                        <option value="Todo Costura">Todo Costura</option>
                        <option value="COMBO">Combos</option>
                    </select>
                </div>

                <div class="table-shelf">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Producto</th>
                                <th>Costo Base</th>
                                <th>Profit</th>
                                <th>Precio Lista (MSRP)</th>
                                <th>Precio Contado</th>
                                <th>Precio QR</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="main_body"></tbody>
                    </table>
                </div>
                <div id="txt_status" class="status-footer"></div>
            </main>
        </div>
    </div>

        const redGs  = v => (v <= 0) ? 0 : (v < 500000 ? (Math.ceil(v / 10000)  * 10000)  - 1000  : (Math.ceil(v / 100000) * 100000) - 10000);
        const redUsd = v => (v <= 0) ? 0 : (v < 100    ? (Math.ceil(v / 10)     * 10)      - 1     : (Math.ceil(v / 100)    * 100)    - 10);
        const esc    = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

        // Normaliza texto para comparación: quita tildes, mayúsculas, caracteres especiales
        const normalize = s => s.toUpperCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^A-Z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();

        // Auto-calcula el costo de un combo sumando los costos de sus componentes
        function autoCalcComboCosto(p, bandaPiso) {
            const raw = p.nombre.replace(/^COMBO:\s*/i, '');
            const parts = raw.split(/\s*\+\s*/);
            let total = 0;
            for (const part of parts) {
                const normPart = normalize(part);
                // Busca coincidencia exacta primero, luego parcial
                const match = db.find(x => x.id !== p.id && normalize(x.nombre) === normPart)
                           || db.find(x => x.id !== p.id && normalize(x.nombre).includes(normPart))
                           || db.find(x => x.id !== p.id && normPart.includes(normalize(x.nombre)) && normalize(x.nombre).length > 8);
                if (!match) return 0; // componente no encontrado → no calcular
                total += match.moneda === 'USD' ? match.costo * bandaPiso : match.costo;
            }
            return total;
        }

        function calculateAll() {
            const dolar = parseFloat(document.getElementById('p_dolar').value) || 6250;
            const bufferP = parseFloat(document.getElementById('p_buffer').value) || 0;
            const bandaPiso = dolar + bufferP;
            document.getElementById('p_banda').value = `Gs. ${bandaPiso.toLocaleString('es-PY')}`;

            db.forEach(p => {
                const mPct = p.margen / 100;
                const isInd = p.linea.includes('INDUSTRIAL');
                const isCombo = p.id.startsWith('CMB') || p.linea.includes('COMBO');

                if (isInd && !isCombo && p.moneda === 'USD') {
                    // Industrial USD (Sol Control, Importacion): precio en USD
                    p.vC = redUsd(p.costo / (1 - mPct));
                    p.vQ = redUsd(p.vC / 0.96);
                    p.profit = p.vC - p.costo;
                    p.mon = 'USD';
                } else {
                    // GS directo (TC-), USD→GS con banda, o combos
                    let costoGs = p.moneda === 'USD' ? p.costo * bandaPiso : p.costo;
                    // Si es combo sin costo cargado, auto-calcular sumando componentes
                    if (costoGs === 0 && isCombo) {
                        costoGs = autoCalcComboCosto(p, bandaPiso);
                    }
                    p.costoCalculado = costoGs; // guardar para display
                    p.vC = redGs(costoGs / (1 - mPct));
                    p.vQ = redGs(p.vC / 0.96);
                    p.vMSRP = redGs(costoGs / 0.64); // Margen lista ~36%
                    p.profit = p.vC - costoGs;
                    p.mon = 'GS';
                }
                
                // Asegurar MSRP para USD
                if (p.mon === 'USD' && !p.vMSRP) {
                    p.vMSRP = redUsd(p.costo / 0.64);
                }
            });
            renderTable();
        }


        function renderTable() {
            const term = document.getElementById('main_search').value.toLowerCase();
            const fLinea = document.getElementById('filter_linea').value;
            const fProv = document.getElementById('filter_prov').value;

            const filtered = db.filter(p => {
                const matchTerm = !term || p.nombre.toLowerCase().includes(term) || p.id.toLowerCase().includes(term);
                const matchLinea = !fLinea || p.linea === fLinea || (fLinea.startsWith('COMBO') && p.linea.includes('COMBO'));
                const matchProv = !fProv || p.prov === fProv || (fProv === 'COMBO' && p.id.startsWith('CMB'));
                return matchTerm && matchLinea && matchProv;
            });

            const rows = filtered.map(p => {
                const sym = p.mon === 'USD' ? 'U$D' : 'Gs.';
                const isCombo = p.id.startsWith('CMB');
                return `
                    <tr>
                        <td class="prod-id" style="font-size:0.7rem; color:var(--solpro-yellow); font-family:'JetBrains Mono';">${esc(p.id)}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span class="badge ${isCombo ? 'badge-combo' : ''}">${esc(p.linea)}</span>
                                <strong style="color:white;">${esc(p.nombre)}</strong>
                            </div>
                        </td>
                        <td>
                            ${p.costo > 0
                                ? `<span style="color:var(--text-muted); font-size:0.8rem;">${p.moneda} ${p.costo.toLocaleString('es-PY')}</span>`
                                : (p.costoCalculado > 0
                                    ? `<span style="color:var(--text-muted); font-size:0.75rem;">Gs. ${Math.round(p.costoCalculado).toLocaleString('es-PY')} <span style="font-size:0.55rem; color:var(--solpro-yellow); background:rgba(241,196,15,0.1); padding:2px 5px; border-radius:4px;">AUTO</span></span>`
                                    : `<span style="color:var(--text-muted);">—</span>`)
                            }
                        </td>
                        <td>${(p.costo > 0 || p.costoCalculado > 0) && p.vC > 0
                                ? `<span class="profit-badge">${sym} ${Math.round(p.profit).toLocaleString('es-PY')}</span>`
                                : '<span style="color:var(--text-muted);font-size:0.7rem;">Sin costo</span>'
                        }</td>
                        <td style="opacity:0.4; font-size:0.8rem; text-decoration:line-through;">${sym} ${p.vMSRP.toLocaleString('es-PY')}</td>
                        <td><span class="price-col ${p.mon === 'USD' ? 'usd-color' : 'gs-color'}">${sym} ${p.vC.toLocaleString('es-PY')}</span></td>
                        <td><span class="price-col" style="color:var(--solpro-yellow); opacity:0.8;">${sym} ${p.vQ.toLocaleString('es-PY')}</span></td>
                        <td>
                            <div class="actions-cell">
                                <button class="btn-action" onclick="shareWS('${esc(p.id)}')" title="WhatsApp"><i data-lucide="share-2"></i></button>
                                <button class="btn-action" onclick="openROI('${esc(p.id)}')" title="ROI"><i data-lucide="trending-up"></i></button>
                                <button class="btn-action" onclick="openEditModal('${esc(p.id)}')" title="Editar"><i data-lucide="edit-3"></i></button>
                                <button class="btn-action btn-danger-action" onclick="deleteProduct('${esc(p.id)}')" title="Borrar"><i data-lucide="trash-2"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('main_body').innerHTML = rows.join('');
            lucide.createIcons();
            document.getElementById('txt_status').innerText = `SOLPRO ECOSYSTEM • ${filtered.length} EQUIPOS CARGADOS`;
        }

        function saveNewProduct() {
            const id = document.getElementById('new_id').value.trim();
            const nombre = document.getElementById('new_nombre').value.trim().toUpperCase();
            if (!id || !nombre) return alert('ID y Nombre obligatorios');
            if (db.find(x => x.id === id)) return alert('Ya existe un producto con ese ID');
            
            db.push({
                id, nombre,
                prov: document.getElementById('new_prov').value,
                linea: document.getElementById('new_linea').value,
                costo: parseFloat(document.getElementById('new_costo').value) || 0,
                moneda: document.getElementById('new_moneda').value,
                margen: parseFloat(document.getElementById('p_margen').value) || 23
            });
            calculateAll();
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            // Limpiar formulario
            document.getElementById('new_nombre').value = '';
            document.getElementById('new_costo').value = '0';
            suggestID();
        }

        function suggestID() {
            const prov = document.getElementById('new_prov').value;
            const pre = prov === 'Sol Control' ? 'SC' : prov === 'Todo Costura' ? 'TC' : prov === 'COMBO' ? 'CMB' : 'IM';
            const count = db.filter(x => x.id.startsWith(pre)).length + 1;
            document.getElementById('new_id').value = `${pre}-${String(count).padStart(3, '0')}`;
        }

        function deleteProduct(id) {
            if (confirm('¿Eliminar producto?')) {
                db = db.filter(x => x.id !== id);
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                calculateAll();
            }
        }

        function openROI(id) {
            const p = db.find(x => x.id === id);
            const dolar = parseFloat(document.getElementById('p_dolar').value);
            const invTotal = p.mon === 'USD' ? p.vC * dolar : p.vC;
            
            document.getElementById('roi_product_name').innerText = p.nombre;
            document.getElementById('roi_total_inv').value = Math.round(invTotal).toLocaleString('es-PY');
            document.getElementById('roiModal').dataset.price = invTotal;
            document.getElementById('roiModal').style.display = 'flex';
            calculateROI();
        }

        function calculateROI() {
            const inv = parseFloat(document.getElementById('roiModal').dataset.price);
            const profit = parseFloat(document.getElementById('roi_profit_unit').value) || 0;
            const daily = parseFloat(document.getElementById('roi_daily_prod').value) || 0;
            const res = document.getElementById('roi_result_days');
            if (profit > 0 && daily > 0) res.innerText = Math.ceil(inv / (profit * daily)).toLocaleString('es-PY');
            else res.innerText = '∞';
        }

        function openEditModal(id) {
            const p = db.find(x => x.id === id);
            document.getElementById('edit_original_id').value = p.id;
            document.getElementById('edit_id').value = p.id;
            document.getElementById('edit_nombre').value = p.nombre;
            document.getElementById('edit_costo').value = p.costo;
            document.getElementById('edit_margen').value = p.margen;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            const id = document.getElementById('edit_original_id').value;
            const p = db.find(x => x.id === id);
            p.nombre = document.getElementById('edit_nombre').value.trim().toUpperCase();
            p.costo = parseFloat(document.getElementById('edit_costo').value) || 0;
            p.margen = parseFloat(document.getElementById('edit_margen').value) || 23;
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            document.getElementById('editModal').style.display = 'none';
            calculateAll();
        }

        function shareWS(id) {
            const p = db.find(x => x.id === id);
            if (!p) return;
            const sym = p.mon === 'USD' ? 'U$D' : 'Gs.';
            const msg = `🚀 *SOLPRO ELITE - COTIZACIÓN*\n\n` +
                        `📦 *Producto:* ${p.nombre}\n` +
                        `🆔 *Ref:* ${p.id}\n\n` +

                        `🌐 *www.solpro.com.py*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function applyGlobalMargin(v) {
            const m = parseFloat(v);
            if (m > 0 && m < 100) { db.forEach(p => p.margen = m); calculateAll(); }
        }

        function saveParams() {
            const p = { dolar: document.getElementById('p_dolar').value, buffer: document.getElementById('p_buffer').value, margen: document.getElementById('p_margen').value };
            localStorage.setItem(PARAMS_KEY, JSON.stringify(p));
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            alert('✅ Base de Datos Sincronizada');
        }

        document.getElementById('btn_export').onclick = () => {
            const fmtGs  = v => `Gs. ${Math.round(v).toLocaleString('es-PY')}`;
            const fmtUsd = v => `U$D ${Math.round(v).toLocaleString('es-PY')}`;

            const headers = 'ID REF;LÍNEA;PRODUCTO;P. CONTADO;P. DIGITAL (QR)\n';
            const rows = db.filter(p => p.vC > 0).map(p => {
                const nombre = p.nombre.replace(/;/g, ',');
                const pC = p.mon === 'USD' ? fmtUsd(p.vC) : fmtGs(p.vC);
                const pQ = p.mon === 'USD' ? fmtUsd(p.vQ) : fmtGs(p.vQ);
                return [p.id, p.linea, nombre, pC, pQ].join(';');
            }).join('\n');

            const csv = '\ufeff' + headers + rows;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv;charset=utf-8;'}));
            a.download = `LISTA_PRECIOS_SOLPRO_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        };

        document.getElementById('btn_save_config').onclick = saveParams;
        document.getElementById('btn_clear').onclick = () => { if(confirm('¿BORRAR TODO?')) { localStorage.clear(); location.reload(); } };

        function parseMasterLine(line) {
            // Format: ID,NOMBRE,LINEA,COSTO,MONEDA
            // Split on comma but only take 5 fields (name may have no commas in MASTER_DATA)
            const parts = line.split(',');
            if (parts.length < 5) return null;
            // Last 3 fields are LINEA, COSTO, MONEDA - name is everything in between
            const id = parts[0].trim();
            const moneda = parts[parts.length - 1].trim();
            const costo = parts[parts.length - 2].trim();
            const linea = parts[parts.length - 3].trim();
            const nombre = parts.slice(1, parts.length - 3).join(',').trim();
            if (!id || !nombre) return null;
            const prov = id.startsWith('SC') ? 'Sol Control' : id.startsWith('TC') ? 'Todo Costura' : id.startsWith('CMB') ? 'COMBO' : 'Importacion SOLPRO';
            return { id, nombre, linea, costo: parseFloat(costo) || 0, moneda, prov, margen: 23 };
        }

        function loadMasterData(savedMargenes) {
            const lines = MASTER_DATA.trim().split('\n');
            db = lines.map(parseMasterLine).filter(x => x !== null);
            // Re-apply any saved margenes
            if (savedMargenes) {
                savedMargenes.forEach(s => {
                    const p = db.find(x => x.id === s.id);
                    if (p) p.margen = s.margen;
                });
            }
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        const MASTER_COUNT = MASTER_DATA.trim().split('\n').length;
        const MASTER_IDS = new Set(MASTER_DATA.trim().split('\n').map(l => l.split(',')[0].trim()));

        window.onload = () => {
            const saved = localStorage.getItem(DB_KEY);
            let savedDb = [];
            try { savedDb = saved ? JSON.parse(saved) : []; } catch(e) { savedDb = []; }

            // Extraer márgenes personalizados y productos adicionales del usuario
            const savedMargenes = {};
            const customProducts = [];
            savedDb.forEach(p => {
                savedMargenes[p.id] = p.margen;
                if (!MASTER_IDS.has(p.id)) customProducts.push(p); // producto añadido por el usuario
            });

            // SIEMPRE cargar desde MASTER_DATA (datos limpios y correctos)
            const lines = MASTER_DATA.trim().split('\n');
            db = lines.map(parseMasterLine).filter(x => x !== null);

            // Reaplica márgenes que el usuario haya editado
            db.forEach(p => {
                if (savedMargenes[p.id] !== undefined) p.margen = savedMargenes[p.id];
            });

            // Agrega productos que el usuario haya creado
            customProducts.forEach(p => db.push(p));

            localStorage.setItem(DB_KEY, JSON.stringify(db));

            // Restaurar parámetros guardados
            const params = JSON.parse(localStorage.getItem(PARAMS_KEY) || '{}');
            if (params.dolar) document.getElementById('p_dolar').value = params.dolar;
            if (params.buffer) document.getElementById('p_buffer').value = params.buffer;
            if (params.margen) document.getElementById('p_margen').value = params.margen;

            calculateAll();
            suggestID();
        };
    </script>
</body>
</html>
